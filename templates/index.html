<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knightfall Chess - Fog of War</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <h1>🏰 Knightfall Chess</h1>
        <p class="subtitle">Fog of War Chess on Aleo Blockchain</p>
      </header>

      <!-- Login Screen -->
      <div id="login-screen" class="screen active">
        <div class="login-box">
          <h2>Welcome to Knightfall</h2>
          <input
            type="text"
            id="username-input"
            placeholder="Enter your username"
            maxlength="20"
          />
          <button id="login-btn" class="btn btn-primary">Enter</button>
        </div>
      </div>

      <!-- Lobby Screen -->
      <div id="lobby-screen" class="screen">
        <div class="lobby-box">
          <h2>Game Lobby</h2>
          <div class="player-info">
            <p><strong>Player:</strong> <span id="player-name"></span></p>
            <p>
              <strong>ELO Rating:</strong> <span id="player-elo">1200</span>
            </p>
          </div>

          <!-- Wallet Section -->
          <div class="wallet-section">
            <div id="wallet-disconnected">
              <button id="connect-wallet-btn" class="btn btn-wallet">
                Connect Shield Wallet
              </button>
              <p class="wallet-hint">Optional: connect to wager ALEO on games</p>
            </div>
            <div id="wallet-connected" style="display: none">
              <div class="wallet-status">
                <span class="wallet-icon">🛡️</span>
                <span id="wallet-address" class="wallet-address"></span>
                <button id="disconnect-wallet-btn" class="btn btn-wallet-disconnect">
                  Disconnect
                </button>
              </div>
              <div class="wager-section">
                <label for="wager-toggle">
                  <input type="checkbox" id="wager-toggle" />
                  Wager 1 ALEO on this game
                </label>
              </div>
            </div>
          </div>

          <button id="find-game-btn" class="btn btn-primary">Find Game</button>
          <button
            id="cancel-search-btn"
            class="btn btn-secondary"
            style="display: none"
          >
            Cancel Search
          </button>
          <p id="lobby-status" class="status-text"></p>
        </div>
      </div>

      <!-- Game Screen -->
      <div id="game-screen" class="screen">
        <!-- Game Info Bar -->
        <div class="game-info">
          <div class="player-panel white-panel">
            <h3>⚪ White</h3>
            <p class="player-name-display" id="white-player-name">Player 1</p>
            <p class="elo-display">ELO: <span id="white-elo">1200</span></p>
          </div>

          <div class="game-status">
            <p id="turn-indicator" class="turn-text">White's Turn</p>
            <p id="game-message" class="message-text"></p>
            <div class="theme-selector">
              <label for="theme-select">Board Theme:</label>
              <select id="theme-select">
                <option value="classic">Classic</option>
                <option value="modern">Modern Blue</option>
                <option value="wooden">Wooden</option>
                <option value="marble">Marble</option>
                <option value="neon">Neon</option>
                <option value="ocean">Ocean</option>
                <option value="forest">Forest</option>
                <option value="sunset">Sunset</option>
              </select>
            </div>
          </div>

          <div class="player-panel black-panel">
            <h3>⚫ Black</h3>
            <p class="player-name-display" id="black-player-name">Player 2</p>
            <p class="elo-display">ELO: <span id="black-elo">1200</span></p>
          </div>
        </div>

        <!-- Chess Board -->
        <div class="board-container">
          <div id="chess-board" class="chess-board"></div>
        </div>

        <!-- Move History -->
        <div class="move-history">
          <h3>Move History</h3>
          <div id="move-list" class="move-list"></div>
        </div>

        <!-- Game Controls -->
        <div class="game-controls">
          <button id="resign-btn" class="btn btn-danger">Resign</button>
          <button
            id="new-game-btn"
            class="btn btn-primary"
            style="display: none"
          >
            New Game
          </button>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/chess-pieces.js') }}"></script>
    <script src="{{ url_for('static', filename='js/board-themes.js') }}"></script>
    <script src="{{ url_for('static', filename='js/wallet.js') }}"></script>
    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
  </body>
</html>
